spring.application.name=task_manager
spring.datasource.url=jdbc:mysql://localhost:3306/task_manager?useSSL=false&serverTimezone=UTC
spring.datasource.username=YourUserHere
spring.datasource.password=YourPasswordHere
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=9092
jwt.secret=MySuperSecretKeyForAuthenticationJwt
jwt.expiration=3600000
cors.allowedOrigins=http://localhost:3000,http://example.com
cors.allowedMethods=GET,POST,PUT,PATCH,DELETE,OPTIONS
cors.allowedHeaders=Origin,Content-Type,Accept,Authorization
